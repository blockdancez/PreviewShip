<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello PreviewShip</title>
    <style>
      :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      body { display: grid; min-height: 100vh; margin: 0; place-items: center; background: #f4f7ff; color: #101828; }
      main { width: min(34rem, calc(100% - 3rem)); padding: 3rem; border: 1px solid #dbe4ff; border-radius: 1.5rem; background: white; box-shadow: 0 24px 70px rgb(15 23 42 / 12%); }
      p { line-height: 1.7; color: #475467; }
      code { padding: .15rem .4rem; border-radius: .35rem; background: #eef2ff; color: #3730a3; }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello from PreviewShip</h1>
      <p>This browser-ready folder can be uploaded directly or deployed with <code>npx previewship deploy ./examples/hello-previewship</code>.</p>
    </main>
  </body>
</html>
